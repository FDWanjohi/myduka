{% extends 'base.html' %}
{% block title %} sales {% endblock %}
{% block content %}


<h4>Sales</h4>
<div>
    <!-- Button trigger modal -->
    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
        Add Sales
    </button>

    <!-- Modal -->
    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Adding a Sale</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form method="post" action="/add_sale">
                        <div class="mb-3">
                            <select class="form-select" name="pid" aria-label="Default select example">
                                <option selected>Select Product</option>
                                {% for product in products_data %}
                                <option value="{{ product[0] }}">{{ product [1] }}</option>
                                {% endfor %}
                            </select>
                            <div class="mb-3">
                                <label for="exampleInputPassword1" class="form-label">Product Quanity</label>
                                <input type="number" name="p_quantity" class="form-control" id="exampleInputPassword1">
                            </div>

                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                <button type="submit" class="btn btn-primary" style="text-align: center;" my-3 py-3>Add
                                    a Sale</button>
                            </div>
                    </form>
                </div>

            </div>
        </div>
    </div>

</div>

<table id="example" class="table table-striped">
    <thead>
        <tr>
            <th>Sale Number</th>
            <th>Product ID</th>
            <th>Product Quantity</th>
            <th>Created At</th>

        </tr>
    </thead>
    <tbody>
        {% for sale in sales_data %}
        <tr>
            <td>{{ sale[0] }}</td>
            <td>{{ sale[1] }}</td>
            <td>{{ sale[2] }}</td>
            <td>{{ sale[3] }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</div>

</div>

{% endblock %}
